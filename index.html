<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Signal — Weekly Social Trends · P&G Home Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d1522; --ink-2:#121c2e; --ink-3:#18253b;
    --line:#243349; --paper:#eef3fb; --paper-dim:#9fb0c7; --paper-faint:#66788f;
    --cyan:#4fd6d0; --cyan-deep:#1f8f8a;
    --amber:#f6b445; --amber-deep:#8a5c12;
    --pos:#57c98a; --neg:#f0736b; --neu:#8aa0bd; --mix:#c79cf0;
    --accent:var(--cyan);            /* set per active brand */
    --radius:14px;
    --shadow:0 1px 0 rgba(255,255,255,.03), 0 18px 40px -24px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(79,214,208,.08), transparent 60%),
      radial-gradient(900px 500px at -5% 110%, rgba(246,180,69,.06), transparent 55%),
      var(--ink);
    color:var(--paper);
    font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  .wrap{max-width:1160px;margin:0 auto;padding:22px 20px 80px}
  a{color:var(--accent);text-decoration:none} a:hover{text-decoration:underline}
  button{font-family:inherit;cursor:pointer}
  h1,h2,h3{font-family:"Space Grotesk",sans-serif;margin:0}

  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:18px}
  .brand{display:flex;align-items:center;gap:14px}
  .mark{width:38px;height:38px;position:relative;flex:0 0 auto}
  .mark span{position:absolute;inset:0;border:2px solid var(--accent);border-radius:50%;opacity:.25;transition:.3s}
  .mark span:nth-child(2){inset:6px;opacity:.5}
  .mark span:nth-child(3){inset:12px;opacity:1;background:var(--accent);border:none}
  .brand h1{font-size:22px;letter-spacing:.5px;font-weight:700}
  .brand .sub{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--paper-faint);font-family:"Space Grotesk";margin-top:2px}
  .stamp{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
  .pill{font-family:"Space Grotesk";font-size:12px;color:var(--paper-dim);border:1px solid var(--line);background:var(--ink-2);padding:7px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:8px}
  .pill .dot{width:7px;height:7px;border-radius:50%;background:var(--pos);box-shadow:0 0 8px var(--pos)}
  .pill b{color:var(--paper);font-weight:600}
  .btn{border:1px solid var(--line);background:var(--ink-3);color:var(--paper);padding:8px 13px;border-radius:10px;font-size:12.5px;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:.15s}
  .btn:hover{border-color:var(--accent)} .btn:disabled{opacity:.5;cursor:progress}

  /* brand tabs */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 16px}
  .tab{background:var(--ink-2);border:1px solid var(--line);border-radius:12px;padding:11px 15px;text-align:left;transition:.15s;position:relative;min-width:120px}
  .tab:hover{border-color:var(--paper-faint)}
  .tab.on{border-color:var(--tab-accent);background:var(--ink-3)}
  .tab.on::after{content:"";position:absolute;left:12px;right:12px;bottom:-1px;height:2px;background:var(--tab-accent);border-radius:2px}
  .tab .nm{font-family:"Space Grotesk";font-weight:600;font-size:15px;display:flex;align-items:center;gap:8px}
  .tab .swatch{width:9px;height:9px;border-radius:3px;background:var(--tab-accent)}
  .tab .ct{font-size:11.5px;color:var(--paper-dim);margin-top:3px}
  .tab .ct b{color:var(--amber)}

  /* filters */
  .filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{background:transparent;border:none;color:var(--paper-dim);padding:7px 12px;font-size:12px;font-weight:600;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--ink-3);color:var(--paper)}
  .chip{border:1px solid var(--line);background:transparent;color:var(--paper-dim);padding:6px 11px;border-radius:999px;font-size:12px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:.12s}
  .chip:hover{color:var(--paper);border-color:var(--paper-faint)}
  .chip.on{background:var(--ink-3);color:var(--paper);border-color:var(--cyan-deep)}
  .chip.alert.on{border-color:var(--amber);color:var(--amber)}
  .chip .pd{width:8px;height:8px;border-radius:2px}
  .sep{width:1px;height:22px;background:var(--line);margin:0 2px}
  .spacer{flex:1}
  .count{font-size:12px;color:var(--paper-faint);font-family:"Space Grotesk"}

  /* cards */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:820px){.grid{grid-template-columns:1fr}}
  .card{background:var(--ink-2);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);position:relative;display:flex;flex-direction:column;gap:12px}
  .card::before{content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:2px;background:var(--rail,transparent)}
  .card.respond{border-color:var(--amber-deep)}
  .c-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .tags{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .ttype{font-family:"Space Grotesk";font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;padding:3px 7px;border-radius:6px;border:1px solid var(--line);color:var(--paper-dim)}
  .c-brandlbl{font-family:"Space Grotesk";font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--paper-faint)}
  .c-title{font-family:"Space Grotesk";font-weight:600;font-size:16px;line-height:1.3;margin-top:5px}
  .flag{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);border:1px solid var(--amber-deep);background:rgba(246,180,69,.08);padding:4px 8px;border-radius:7px;white-space:nowrap}
  .c-summary{font-size:13.5px;color:var(--paper-dim)}
  .meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;font-size:12px}
  .plats{display:flex;gap:5px} .plat{font-size:10px;font-weight:600;padding:3px 7px;border-radius:6px}
  .signal{display:flex;align-items:center;gap:7px;color:var(--paper);font-family:"Space Grotesk";font-weight:600}
  .meter{display:flex;gap:2px;align-items:flex-end;height:14px} .meter i{width:3px;border-radius:1px;display:block}
  .sent{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.04)}
  .c-foot{display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--line);padding-top:12px}
  .mini{border:1px solid var(--line);background:var(--ink-3);color:var(--paper);padding:7px 11px;border-radius:9px;font-size:12px;font-weight:600;display:inline-flex;gap:6px;align-items:center}
  .mini:hover{border-color:var(--accent)}
  .mini.key{border-color:var(--amber-deep);color:var(--amber)} .mini.key:hover{background:rgba(246,180,69,.06)}
  .src{margin-left:auto;font-size:12px;align-self:center;color:var(--paper-faint)}
  .empty{grid-column:1/-1;text-align:center;padding:56px 20px;color:var(--paper-faint)}
  .empty h3{font-size:16px;color:var(--paper-dim);margin-bottom:6px}

  /* 52-week trend line */
  .trendrow{display:flex;align-items:center;gap:10px}
  .trendrow .lab{font-family:"Space Grotesk";font-size:9.5px;letter-spacing:.11em;text-transform:uppercase;color:var(--paper-faint);line-height:1.25;flex:0 0 auto;width:52px}
  .spark{flex:1;min-width:0;height:34px;display:block}
  .delta{font-family:"Space Grotesk";font-weight:600;font-size:12px;white-space:nowrap;flex:0 0 auto}
  .delta.up{color:var(--pos)} .delta.dn{color:var(--neg)} .delta.flat{color:var(--paper-faint)}

  /* example content links */
  .section-lab{font-family:"Space Grotesk";font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--paper-faint);margin-bottom:-4px}
  .examples{display:flex;flex-direction:column;gap:6px}
  .exrow{display:flex;align-items:flex-start;gap:9px;border:1px solid var(--line);background:var(--ink-3);border-radius:9px;padding:8px 10px;transition:.12s;color:var(--paper)}
  .exrow:hover{border-color:var(--accent);text-decoration:none}
  .exrow .plat{flex:0 0 auto;margin-top:1px}
  .exrow .appeal{font-size:12px;color:var(--paper-dim);line-height:1.4}
  .exrow .go{margin-left:auto;flex:0 0 auto;color:var(--paper-faint);font-size:12px;align-self:center}
  .exrow:hover .go{color:var(--accent)}

  /* recommended response */
  .response{background:rgba(79,214,208,.05);border:1px solid var(--cyan-deep);border-radius:10px;padding:10px 12px}
  .response.alert{background:rgba(246,180,69,.06);border-color:var(--amber-deep)}
  .response .lab{font-family:"Space Grotesk";font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
  .response.alert .lab{color:var(--amber)}
  .response p{margin:0;font-size:13px;color:var(--paper);line-height:1.45}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(5,9,16,.72);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:40px 16px;z-index:50;overflow:auto}
  .scrim.on{display:flex}
  .modal{background:var(--ink-2);border:1px solid var(--line);border-radius:16px;max-width:680px;width:100%;box-shadow:var(--shadow)}
  .m-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
  .m-head .eyb{font-family:"Space Grotesk";font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)}
  .m-head h3{font-size:17px;margin-top:2px}
  .x{border:none;background:none;color:var(--paper-dim);font-size:22px;line-height:1;padding:4px 8px;border-radius:8px} .x:hover{background:var(--ink-3);color:var(--paper)}
  .m-body{padding:18px}
  .toggle{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:14px}
  .toggle button{background:transparent;border:none;color:var(--paper-dim);padding:8px 14px;font-size:12.5px;font-weight:600} .toggle button.on{background:var(--ink-3);color:var(--paper)}
  .brief-out{background:var(--ink);border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-size:13.5px;white-space:pre-wrap;max-height:52vh;overflow:auto;color:var(--paper)}
  .brief-out h4{font-family:"Space Grotesk";color:var(--accent);font-size:12.5px;letter-spacing:.05em;text-transform:uppercase;margin:14px 0 4px} .brief-out h4:first-child{margin-top:0}
  .m-foot{display:flex;gap:10px;padding:14px 18px;border-top:1px solid var(--line)}
  .load{display:flex;align-items:center;gap:12px;color:var(--paper-dim);font-size:13px;padding:26px 4px}
  .spin{width:16px;height:16px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:sp 1s linear infinite} @keyframes sp{to{transform:rotate(360deg)}}
  .note{font-size:11.5px;color:var(--paper-faint);text-align:center;margin-top:26px;line-height:1.6}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink-3);border:1px solid var(--cyan-deep);color:var(--paper);padding:10px 16px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;z-index:70;max-width:90vw;text-align:center}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="mark"><span></span><span></span><span></span></div>
      <div><h1>Signal</h1><div class="sub">Weekly Social Trends · P&amp;G Home Care</div></div>
    </div>
    <div class="stamp">
      <span class="pill"><span class="dot"></span> Updated <b id="stampWeek">—</b> · refreshes weekly</span>
      <button class="btn" id="refreshBtn">↻ Refresh</button>
    </div>
  </header>

  <div class="tabs" id="tabs"></div>

  <div class="filters" id="filters">
    <div class="seg" id="typeSeg"></div>
    <div class="sep"></div>
    <button class="chip alert" data-respond="1">▲ Respond now</button>
    <div class="sep"></div>
    <!-- platform chips injected -->
    <div class="spacer"></div>
    <span class="count" id="count"></span>
  </div>

  <div class="grid" id="grid"></div>
  <p class="note" id="note"></p>
</div>

<div class="scrim" id="scrim">
  <div class="modal">
    <div class="m-head">
      <div><div class="eyb" id="mEyebrow">Brief</div><h3 id="mTitle">—</h3></div>
      <button class="x" id="mClose">&times;</button>
    </div>
    <div class="m-body">
      <div class="toggle" id="briefToggle">
        <button data-kind="influencer" class="on">Influencer brief</button>
        <button data-kind="post">Branded post</button>
      </div>
      <div id="mContent"></div>
    </div>
    <div class="m-foot" id="mFoot" style="display:none">
      <button class="btn" id="mCopy">Copy</button>
      <button class="btn" id="mRegen">Regenerate</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Signal · brand-owner view. Loads data/trends.json (written
   weekly by the GitHub Action); falls back to embedded seed.
   ============================================================ */

const BRANDS = [
  {id:"all",     name:"All brands", accent:"#4fd6d0"},
  {id:"cascade", name:"Cascade",    accent:"#2fa4e0"},
  {id:"dawn",    name:"Dawn",       accent:"#3d7fe0"},
  {id:"febreze", name:"Febreze",    accent:"#17b0a3"},
  {id:"swiffer", name:"Swiffer",    accent:"#3fb85f"},
  {id:"mrclean", name:"Mr. Clean",  accent:"#35c6d6"},
];
const TYPES = [
  {id:"all",       label:"All signals"},
  {id:"owned",     label:"Owned"},
  {id:"category",  label:"Category"},
  {id:"competitor",label:"Competitor"},
  {id:"landscape", label:"Landscape"},
];
const PLATFORMS = {
  tiktok:{label:"TikTok",bg:"#25252b",fg:"#ff5b8a"}, instagram:{label:"Instagram",bg:"#2a2033",fg:"#e08bd0"},
  facebook:{label:"Facebook",bg:"#1c2740",fg:"#6ea8ff"}, reddit:{label:"Reddit",bg:"#2e2016",fg:"#ff8b4d"},
  youtube:{label:"YouTube",bg:"#2e1a1c",fg:"#ff7a7a"}, x:{label:"X",bg:"#20262e",fg:"#c8d4e2"},
};
const SENT={pos:{label:"Positive",c:"var(--pos)"},neg:{label:"Negative",c:"var(--neg)"},neu:{label:"Neutral",c:"var(--neu)"},mix:{label:"Mixed",c:"var(--mix)"}};
const TYPELABEL={owned:"Owned",category:"Category",competitor:"Competitor",landscape:"Landscape"};

/* ---------- seed (illustrative until the first weekly refresh) ---------- */
const SEED = [
 {brands:["all"],type:"landscape",lbl:"CleanTok",title:"‘Underconsumption core’ backlash grows",summary:"Creators reframing cleaning-product haul/restock content as wasteful; ‘use what you have’ framing racking up millions of views.",platforms:["tiktok","instagram"],signal:88,sent:"mix",respond:true,angle:"Portfolio reputational watch-item. Ride the sentiment with value / ‘one bottle does more’ efficacy messaging rather than fighting it.",src:"https://www.tiktok.com/search?q=underconsumption"},
 {brands:["all"],type:"landscape",lbl:"ASMR",title:"Restock & refill ASMR still a top format",summary:"‘Restock my cleaning cabinet’ decant/ASMR remains a dominant home-content format across TikTok and YouTube.",platforms:["tiktok","youtube","instagram"],signal:74,sent:"pos",respond:false,angle:"Seed refill-friendly / decant-ready packaging moments with cleaning creators.",src:"https://www.tiktok.com/search?q=cleaning+restock"},
 {brands:["cascade","dawn"],type:"category",lbl:"Laundry",title:"‘Laundry stripping’ resurgence",summary:"Viral before/after soak videos showing ‘hidden dirt’; fuels skepticism about everyday detergent efficacy.",platforms:["tiktok","reddit","youtube"],signal:79,sent:"mix",respond:true,angle:"Efficacy-defense moment: deep-clean proof demos (Dawn degrease, Cascade food-film removal).",src:"https://www.reddit.com/search/?q=laundry%20stripping"},
 {brands:["cascade"],type:"category",lbl:"Hard water",title:"Hard-water spot complaints trending",summary:"‘Cloudy glasses’ / dishwasher spotting frustration spiking; users blaming detergents and switching brands.",platforms:["reddit","tiktok"],signal:66,sent:"neg",respond:true,angle:"Direct Cascade win: rinse-aid + Platinum spot-protection proof; intercept switchers with a demo.",src:"https://www.reddit.com/r/CleaningTips/"},
 {brands:["dawn"],type:"owned",lbl:"Dawn",title:"Ingredient-safety attack recirculating",summary:"‘Toxic ingredients’ posts targeting dish soaps incl. Dawn; amplified by clean-living creators, offset by wildlife-rescue goodwill.",platforms:["tiktok","instagram","facebook"],signal:82,sent:"neg",respond:true,angle:"Lean on wildlife-rescue equity + transparent ingredient explainer with a trusted science creator. Do NOT amplify the claim directly.",src:"https://www.tiktok.com/search?q=dawn+dish+soap+ingredients"},
 {brands:["dawn"],type:"owned",lbl:"Dawn",title:"Powerwash ‘one-spray’ hacks evergreen",summary:"Powerwash over-indexes in cleaning-hack content (stovetops, sneakers, patios); strong organic advocacy.",platforms:["tiktok","instagram"],signal:77,sent:"pos",respond:false,angle:"Amplify UGC: creator ‘surprising uses’ series; low cost, high affinity.",src:"https://www.tiktok.com/search?q=dawn+powerwash+hack"},
 {brands:["mrclean"],type:"owned",lbl:"Mr. Clean",title:"Magic Eraser ‘what NOT to use it on’ discourse",summary:"Cautionary content about surfaces it damages (screens, car paint) getting big reach; mix of helpful + alarmist.",platforms:["tiktok","reddit"],signal:63,sent:"mix",respond:true,angle:"Get ahead with an official ‘best uses / avoid’ guide via a trusted cleaning creator; turns caution into usage confidence.",src:"https://www.reddit.com/r/CleaningTips/"},
 {brands:["febreze"],type:"owned",lbl:"Febreze",title:"‘Just masks smells’ skepticism persists",summary:"Recurring critique that air fresheners cover rather than eliminate odor; rivals leaning into ‘natural’ positioning.",platforms:["reddit","tiktok"],signal:58,sent:"neg",respond:false,angle:"Odor-elimination proof (pet/cooking) demos; ‘eliminates vs masks’ mechanism explainer.",src:"https://www.reddit.com/search/?q=febreze"},
 {brands:["swiffer"],type:"owned",lbl:"Swiffer",title:"Refill-cost complaints vs reusable mops",summary:"‘Swiffer is a scam / buy reusable’ value critique steady; reusable-pad dupes promoted heavily.",platforms:["tiktok","reddit"],signal:61,sent:"neg",respond:true,angle:"Value + convenience reframe; WetJet deep-clean demos; consider washable-pad narrative.",src:"https://www.tiktok.com/search?q=swiffer+worth+it"},
 {brands:["mrclean"],type:"competitor",lbl:"The Pink Stuff",title:"The Pink Stuff momentum still elevated",summary:"Cult paste sustains heavy creator adoption for ‘impossible’ stain jobs; strong earned reach, near-zero paid.",platforms:["tiktok","instagram","youtube"],signal:85,sent:"pos",respond:true,angle:"Direct Magic Eraser overlap. Counter with a heavy-duty head-to-head scrub demo + creator seeding.",src:"https://www.tiktok.com/search?q=the+pink+stuff"},
 {brands:["febreze","mrclean"],type:"competitor",lbl:"Hypochlorous acid",title:"Hypochlorous-acid (HOCl) cleaners surging",summary:"‘Force of Nature’-style HOCl sprays framed as safe, non-toxic, kid/pet-friendly; fast-growing clean-living challenger.",platforms:["tiktok","instagram"],signal:80,sent:"pos",respond:true,angle:"Emerging threat to multi-surface & air-care. Track claims; prep a ‘proven clean, no compromise’ counter-narrative.",src:"https://www.tiktok.com/search?q=hypochlorous+acid+cleaner"},
 {brands:["mrclean"],type:"competitor",lbl:"Purple cleaner",title:"‘Purple cleaner’ dupes targeting Mr. Clean",summary:"Generic purple multi-surface cleaners positioned as cheaper Mr. Clean alternatives; heavy dupe-culture framing.",platforms:["tiktok"],signal:69,sent:"mix",respond:false,angle:"Defend with brand-trust + efficacy proof; monitor pricing/perception gap.",src:"https://www.tiktok.com/search?q=purple+cleaner"},
 {brands:["cascade","dawn"],type:"competitor",lbl:"Blueland",title:"Refill-tablet sustainability push",summary:"Tablet & concentrate brands leaning on plastic-reduction; resonates with ‘underconsumption’ sentiment.",platforms:["instagram","tiktok"],signal:64,sent:"pos",respond:false,angle:"Watch sustainability perception gap vs P&G refill efforts; message accordingly.",src:"https://www.instagram.com/explore/tags/blueland/"},
];

let state={activeBrand:"all",activeType:"all",activePlatforms:new Set(),respondOnly:false,trends:SEED,week:weekLabel(),briefs:{},source:"seed"};
function weekLabel(d){return (d||new Date()).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function accent(){return (BRANDS.find(b=>b.id===state.activeBrand)||BRANDS[0]).accent;}

/* ---------- data load ---------- */
async function loadData(){
  // 1) published data written by the weekly Action
  try{
    const res=await fetch("data/trends.json",{cache:"no-store"});
    if(res.ok){
      const j=await res.json();
      if(j&&Array.isArray(j.trends)&&j.trends.length){
        state.trends=j.trends; state.week=j.week||state.week; state.source="published"; return;
      }
    }
  }catch(e){/* not published / running locally */}
  // 2) artifact storage (in-preview live refreshes persist here)
  try{
    const r=await window.storage.get("signal:hc:v2");
    if(r&&r.value){const s=JSON.parse(r.value); if(s.trends&&s.trends.length){state.trends=s.trends;state.week=s.week||state.week;state.briefs=s.briefs||{};state.source="storage";return;}}
  }catch(e){}
  // 3) embedded seed
  state.source="seed";
}
async function persist(){ try{ await window.storage.set("signal:hc:v2",JSON.stringify({trends:state.trends,week:state.week,briefs:state.briefs})); }catch(e){} }

/* ---------- filtering ---------- */
function inBrand(t){ return state.activeBrand==="all" || (t.brands||[]).includes(state.activeBrand) || (t.brands||[]).includes("all"); }
function visible(){
  let t=state.trends.filter(inBrand);
  if(state.activeType!=="all") t=t.filter(x=>x.type===state.activeType);
  if(state.respondOnly) t=t.filter(x=>x.respond);
  if(state.activePlatforms.size) t=t.filter(x=>(x.platforms||[]).some(p=>state.activePlatforms.has(p)));
  return t.sort((a,b)=>(b.respond-a.respond)||(b.signal-a.signal));
}
function meterBars(sig){let lvl=Math.max(1,Math.round(sig/12.5)),h="";for(let i=1;i<=8;i++){const on=i<=lvl,ht=4+i*1.2,col=sig>=78?"var(--amber)":"var(--accent)";h+=`<i style="height:${ht}px;background:${on?col:'var(--line)'}"></i>`;}return h;}

/* ---------- 52-week mentions trend line ---------- */
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function rng(seed){let s=(seed>>>0)||1;return ()=>{s=(Math.imul(s,1664525)+1013904223)>>>0;return s/4294967296;};}
// Real weekly mention index if the refresh provided it; else a directional
// curve derived deterministically from the trend's momentum score.
function seriesFor(t){
  if(Array.isArray(t.mentions52w)&&t.mentions52w.length) return t.mentions52w;
  const r=rng(hashStr((t.title||"")+(t.lbl||"")));
  const peak=Math.max(20,Math.min(100,t.signal||60));
  const base=Math.max(8,peak*(0.55+r()*0.18));           // start 55-73% of peak
  const exp=1.1+r()*0.5;                                  // gentle-to-moderate ramp
  const out=[];
  for(let i=0;i<52;i++){
    const ramp=base+(peak-base)*Math.pow(i/51,exp);      // build toward recent weeks
    const wobble=(r()-0.5)*peak*0.12;
    out.push(Math.max(2,Math.round(ramp+wobble)));
  }
  return out;
}
function seriesDelta(a){const n=a.length;if(n<8)return 0;const early=a.slice(0,4).reduce((x,y)=>x+y,0)/4;const late=a.slice(-4).reduce((x,y)=>x+y,0)/4;return early?Math.round((late-early)/early*100):0;}
function sparkline(a,color){
  const w=170,h=34,p=3,max=Math.max(...a),min=Math.min(...a),span=(max-min)||1;
  const pts=a.map((v,i)=>[p+(i/(a.length-1))*(w-2*p), h-p-((v-min)/span)*(h-2*p)]);
  const line=pts.map((q,i)=>(i?"L":"M")+q[0].toFixed(1)+" "+q[1].toFixed(1)).join(" ");
  const area=`M${pts[0][0].toFixed(1)} ${h-p} `+pts.map(q=>"L"+q[0].toFixed(1)+" "+q[1].toFixed(1)).join(" ")+` L${pts[pts.length-1][0].toFixed(1)} ${h-p} Z`;
  const last=pts[pts.length-1];
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" role="img" aria-label="52-week mentions trend">
    <path d="${area}" fill="${color}" opacity="0.13"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="2.4" fill="${color}"/></svg>`;
}
/* ---------- example TikTok / Instagram content ---------- */
// Uses curated links from the weekly refresh when present; otherwise builds
// real, working platform deep-links (hashtag / search) so each trend still
// links straight to the content until the next refresh curates specific posts.
function examplesFor(t){
  if(Array.isArray(t.examples)&&t.examples.length)
    return t.examples.slice(0,3).map(e=>({platform:(e.platform||"tiktok"),url:e.url,appeal:e.appeal||t.summary||""})).filter(e=>e.url);
  const tag=(t.lbl||t.title||"cleaning").toLowerCase().replace(/[^a-z0-9]+/g,"");
  const q=encodeURIComponent(t.lbl||t.title||"cleaning");
  const base=t.summary||t.title||"";
  return [
    {platform:"tiktok",   url:`https://www.tiktok.com/tag/${tag}`,              appeal:`Top TikToks under #${tag} — ${base}`},
    {platform:"instagram",url:`https://www.instagram.com/explore/tags/${tag}/`,appeal:`Instagram Reels & grid on #${tag} — high save/share format.`},
    {platform:"tiktok",   url:`https://www.tiktok.com/search?q=${q}`,           appeal:`Freshest “${t.lbl||t.title}” clips as they surface.`},
  ];
}

/* ---------- render ---------- */
function renderTabs(){
  const counts={}; BRANDS.forEach(b=>counts[b.id]={n:0,r:0});
  state.trends.forEach(t=>{
    BRANDS.forEach(b=>{
      const hit = b.id==="all" || (t.brands||[]).includes(b.id) || (t.brands||[]).includes("all");
      if(hit){counts[b.id].n++; if(t.respond)counts[b.id].r++;}
    });
  });
  document.getElementById("tabs").innerHTML=BRANDS.map(b=>{
    const c=counts[b.id]; const r=c.r?`&nbsp;·&nbsp;<b>${c.r} to action</b>`:"";
    const sw=b.id==="all"?"":`<span class="swatch"></span>`;
    return `<button class="tab ${b.id===state.activeBrand?'on':''}" data-brand="${b.id}" style="--tab-accent:${b.accent}">
      <div class="nm">${sw}${b.name}</div><div class="ct">${c.n} trend${c.n===1?'':'s'}${r}</div></button>`;
  }).join("");
  document.querySelectorAll(".tab").forEach(el=>el.onclick=()=>{state.activeBrand=el.dataset.brand;document.documentElement.style.setProperty("--accent",accent());renderAll();});
}
function renderTypeSeg(){
  document.getElementById("typeSeg").innerHTML=TYPES.map(t=>`<button data-type="${t.id}" class="${t.id===state.activeType?'on':''}">${t.label}</button>`).join("");
  document.querySelectorAll("#typeSeg button").forEach(b=>b.onclick=()=>{state.activeType=b.dataset.type;renderAll();});
}
function renderFilters(){
  const box=document.getElementById("filters"); box.querySelectorAll(".chip.platform").forEach(n=>n.remove());
  const spacer=box.querySelector(".spacer");
  Object.entries(PLATFORMS).forEach(([id,p])=>{
    const b=document.createElement("button"); b.className="chip platform"+(state.activePlatforms.has(id)?" on":"");
    b.innerHTML=`<span class="pd" style="background:${p.fg}"></span>${p.label}`;
    b.onclick=()=>{state.activePlatforms.has(id)?state.activePlatforms.delete(id):state.activePlatforms.add(id);renderAll();};
    box.insertBefore(b,spacer);
  });
  const rc=box.querySelector("[data-respond]"); rc.classList.toggle("on",state.respondOnly);
  rc.onclick=()=>{state.respondOnly=!state.respondOnly;renderAll();};
}
let VIEW=[];
function card(t,i){
  const plats=(t.platforms||[]).map(p=>{const c=PLATFORMS[p]||{label:p,bg:"#222",fg:"#ccc"};return `<span class="plat" style="background:${c.bg};color:${c.fg}">${c.label}</span>`}).join("");
  const s=SENT[t.sent]||SENT.neu; const rail=t.respond?"var(--amber)":accent();
  const col=t.respond?"var(--amber)":accent();
  const series=seriesFor(t); const d=seriesDelta(series);
  const dcls=d>3?"up":d<-3?"dn":"flat"; const darr=d>3?"▲":d<-3?"▼":"→";
  const exs=examplesFor(t);
  const exHtml=exs.map(e=>{const c=PLATFORMS[e.platform]||{label:e.platform,bg:"#222",fg:"#ccc"};
    return `<a class="exrow" href="${e.url}" target="_blank" rel="noopener">
      <span class="plat" style="background:${c.bg};color:${c.fg}">${c.label}</span>
      <span class="appeal">${e.appeal||''}</span><span class="go">↗</span></a>`;}).join("");
  const resp=t.response||t.angle||"";
  return `<article class="card ${t.respond?'respond':''}" style="--rail:${rail}">
    <div class="c-head"><div>
      <div class="tags"><span class="ttype">${TYPELABEL[t.type]||t.type||''}</span><span class="c-brandlbl">${t.lbl||''}</span></div>
      <div class="c-title">${t.title}</div>
    </div>${t.respond?'<span class="flag">Respond</span>':''}</div>
    <p class="c-summary">${t.summary||''}</p>
    <div class="meta">
      <span class="signal"><span class="meter">${meterBars(t.signal||60)}</span>${t.signal||60}</span>
      <span class="sent" style="color:${s.c}">${s.label}</span>
      <span class="plats">${plats}</span>
    </div>
    <div class="trendrow">
      <span class="lab">Mentions<br>52&nbsp;wk</span>
      ${sparkline(series,col)}
      <span class="delta ${dcls}">${darr} ${d>0?'+':''}${d}%</span>
    </div>
    ${exs.length?`<div class="section-lab">Example content · what's resonating</div><div class="examples">${exHtml}</div>`:''}
    ${resp?`<div class="response ${t.respond?'alert':''}"><div class="lab">Recommended response</div><p>${resp}</p></div>`:''}
    <div class="c-foot">
      <button class="mini key" data-brief="${i}">✎ Generate brief</button>
      ${t.angle?`<button class="mini" data-why="${i}">Why it matters</button>`:''}
      ${t.src?`<a class="src" href="${t.src}" target="_blank" rel="noopener">Verbatims ↗</a>`:''}
    </div></article>`;
}
function renderGrid(){
  VIEW=visible(); const g=document.getElementById("grid");
  if(!VIEW.length) g.innerHTML=`<div class="empty"><h3>Nothing matches these filters</h3><p>Clear a signal type, platform, or the Respond-now filter.</p></div>`;
  else g.innerHTML=VIEW.map((t,i)=>card(t,i)).join("");
  document.getElementById("count").textContent=`${VIEW.length} shown`;
  g.querySelectorAll("[data-brief]").forEach(b=>b.onclick=()=>openBrief(VIEW[+b.dataset.brief]));
  g.querySelectorAll("[data-why]").forEach(b=>b.onclick=()=>toast(VIEW[+b.dataset.why].angle,4600));
}
function renderAll(){document.documentElement.style.setProperty("--accent",accent());renderTabs();renderTypeSeg();renderFilters();renderGrid();document.getElementById("stampWeek").textContent=state.week;}

let toastTimer; function toast(m,ms=2400){const el=document.getElementById("toast");el.textContent=m;el.classList.add("on");clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("on"),ms);}

/* ============================================================
   Briefs: prefer pre-generated (from the weekly Action).
   If absent, try a live call (works only inside Claude's
   artifact preview); otherwise show a graceful fallback.
   ============================================================ */
let curTrend=null,curKind="influencer";
function briefKeyOf(t){return (t.title||"")+"|"+curKind;}
function openBrief(t){
  curTrend=t;curKind="influencer";
  document.getElementById("mEyebrow").textContent=(t.lbl||"")+" · "+(TYPELABEL[t.type]||"");
  document.getElementById("mTitle").textContent=t.title;
  document.querySelectorAll("#briefToggle button").forEach(b=>b.classList.toggle("on",b.dataset.kind==="influencer"));
  document.getElementById("scrim").classList.add("on");
  showOrGenerate();
}
function closeBrief(){document.getElementById("scrim").classList.remove("on");}
function embedded(t){return t.briefs&&t.briefs[curKind];}
function showOrGenerate(){
  const t=curTrend;
  if(embedded(t)){showBrief(embedded(t),true);return;}
  const k=briefKeyOf(t); if(state.briefs[k]){showBrief(state.briefs[k],true);return;}
  genBrief();
}
async function callClaude(messages){
  // Works in the artifact preview (key injected). On a static host this
  // request is blocked/unauthorized and we fall back gracefully.
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages})});
  const data=await res.json();
  return (data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n").trim();
}
function briefPrompt(t){
  const shared=`Trend: "${t.title}"\nTheme: ${t.lbl}\nWhat's happening: ${t.summary}\nPlatforms: ${(t.platforms||[]).join(", ")}\nSentiment: ${t.sent}. Momentum: ${t.signal}/99.\nResponse angle: ${t.angle||"n/a"}\nP&G Home Care brand(s): Cascade, Dawn, Febreze, Swiffer, or Mr. Clean as appropriate.`;
  return curKind==="influencer"
   ? `You are a brand strategist at P&G Home Care. Write a tight CREATOR/INFLUENCER BRIEF for this trend.\n${shared}\n\nSection headers, each prefixed '## ':\n## Objective\n## Which P&G brand\n## Target creators\n## Key message\n## Hook / opening\n## Do\n## Don't\n## Suggested content\n## Hashtags & CTA\n## KPI\nSpecific, scannable, no preamble.`
   : `You are a social copywriter at P&G Home Care. Draft a BRANDED SOCIAL POST for this trend.\n${shared}\n\n'## ' headers:\n## Platform & format\n## Caption (ready to post)\n## Hook (first line / first 2s)\n## Visual direction\n## Hashtags\n## CTA\nIn-brand, punchy, no corporate stiffness. No preamble.`;
}
async function genBrief(){
  const t=curTrend; const foot=document.getElementById("mFoot"); foot.style.display="none";
  document.getElementById("mContent").innerHTML=`<div class="load"><div class="spin"></div> Drafting ${curKind==='influencer'?'influencer brief':'branded post'}…</div>`;
  try{
    const txt=await callClaude([{role:"user",content:briefPrompt(t)}]);
    if(!txt) throw new Error("empty");
    state.briefs[briefKeyOf(t)]=txt; persist(); showBrief(txt,false);
  }catch(e){
    document.getElementById("mContent").innerHTML=`<div class="brief-out">Live brief generation runs inside Claude's artifact preview only.\n\nOn the published site, briefs for <b>Respond-now</b> trends are written automatically each week by the refresh job. To draft this one on demand, open it in the Claude artifact, or add a small serverless endpoint (see README → “On-demand briefs”).</div>`;
    document.getElementById("mFoot").style.display="none";
  }
}
function showBrief(txt,pregen){
  const html=txt.replace(/^##\s+(.*)$/gm,'<h4>$1</h4>').replace(/\*\*(.*?)\*\*/g,'<b>$1</b>');
  document.getElementById("mContent").innerHTML=`<div class="brief-out">${html}</div>`;
  const foot=document.getElementById("mFoot"); foot.style.display="flex";
  document.getElementById("mRegen").style.display=pregen?"none":"inline-flex";
}

/* ---------- wiring ---------- */
document.getElementById("mClose").onclick=closeBrief;
document.getElementById("scrim").onclick=e=>{if(e.target.id==="scrim")closeBrief();};
document.getElementById("mRegen").onclick=()=>{delete state.briefs[briefKeyOf(curTrend)];genBrief();};
document.getElementById("mCopy").onclick=()=>{const txt=document.getElementById("mContent").innerText;navigator.clipboard?.writeText(txt).then(()=>toast("Brief copied"),()=>toast("Copy failed"));};
document.querySelectorAll("#briefToggle button").forEach(b=>b.onclick=()=>{curKind=b.dataset.kind;document.querySelectorAll("#briefToggle button").forEach(x=>x.classList.toggle("on",x===b));showOrGenerate();});
document.getElementById("refreshBtn").onclick=async()=>{
  const btn=document.getElementById("refreshBtn"); btn.disabled=true; const o=btn.innerHTML; btn.innerHTML="↻ Refreshing…";
  try{
    // Live in-preview refresh (artifact only). On the published site, refresh
    // is owned by the weekly GitHub Action — this will fall through to the toast.
    const txt=await callClaude([{role:"user",content:"Reply with the single word: ok"}]);
    if(txt) toast("Live refresh runs in the Claude artifact. On GitHub, the weekly Action refreshes automatically — trigger it early with ‘Run workflow’.",5200);
    else throw new Error();
  }catch(e){ toast("On GitHub this refreshes automatically each week via the Action. See README to run it early.",5200); }
  btn.disabled=false; btn.innerHTML=o;
};

document.getElementById("note").innerHTML="Refresh pulls from public sources only (Google Trends, Reddit, TikTok, news &amp; creator coverage) — no Sprinklr / Brandwatch data leaves P&amp;G systems. Signal, sentiment &amp; the 52-week mentions index are directional estimates for prioritization, not licensed metrics. Example links open directly to TikTok / Instagram; the weekly refresh curates specific posts, otherwise cards deep-link to the live hashtag / search.";

/* ---------- init ---------- */
(async function(){ await loadData(); document.documentElement.style.setProperty("--accent",accent()); renderAll(); })();
</script>
